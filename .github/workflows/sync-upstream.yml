name: Sync from upstream + rebase patches

# Pulls main from upstream vectorize-io/hindsight, rebases our patch
# commits on top, pushes the result. Runs daily and on manual dispatch.
#
# Conflict policy: if rebase fails (e.g. upstream rewrote gemini_llm.py
# in a way that conflicts with our HttpOptions patch), the workflow
# aborts the rebase and opens an issue tagged `merge-conflict` for
# manual resolution. We never auto-resolve to avoid silently dropping
# the patch.

on:
  schedule:
    # Daily at 03:17 UTC. Off-peak relative to typical upstream merge
    # windows; staggered minute to avoid GitHub's top-of-hour load.
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: 'Upstream ref to sync (default: main)'
        required: false
        default: 'main'

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name 'sync-bot'
          git config user.email 'sync-bot@users.noreply.github.com'

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/vectorize-io/hindsight.git
          git fetch upstream

      - name: Rebase fork main onto upstream main
        id: rebase
        run: |
          UPSTREAM_REF='${{ github.event.inputs.upstream_ref || ''main'' }}'
          echo "Rebasing onto upstream/${UPSTREAM_REF}"
          git checkout main
          # Try rebase. If it fails, capture state for the issue body.
          if git rebase "upstream/${UPSTREAM_REF}"; then
            echo "result=clean" >> $GITHUB_OUTPUT
          else
            echo "result=conflict" >> $GITHUB_OUTPUT
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            {
              echo 'conflicts<<EOF'
              echo "$CONFLICTS"
              echo 'EOF'
            } >> $GITHUB_OUTPUT
            git rebase --abort
          fi

      - name: Push (force-with-lease) on clean rebase
        if: steps.rebase.outputs.result == 'clean'
        run: |
          # Only push if there's anything new to push.
          if [ -n "$(git log --oneline 'origin/main..HEAD')" ]; then
            git push --force-with-lease origin main
            echo 'Pushed updated main.'
          else
            echo 'Already up-to-date; nothing to push.'
          fi

      - name: Open issue on conflict
        if: steps.rebase.outputs.result == 'conflict'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const conflicts = `${{ steps.rebase.outputs.conflicts }}`;
            const body = [
              '## Upstream sync conflict',
              '',
              'The scheduled rebase from `vectorize-io/hindsight:main` could not be applied cleanly.',
              '',
              '### Conflicting files',
              '```',
              conflicts || '(no list captured)',
              '```',
              '',
              '### How to resolve',
              '',
              '1. `git fetch upstream`',
              '2. `git checkout main`',
              '3. `git rebase upstream/main`',
              '4. Resolve conflicts manually — pay attention to `hindsight-api-slim/hindsight_api/engine/providers/gemini_llm.py` where the `HttpOptions` patch lives.',
              '5. `git push --force-with-lease origin main`',
              '',
              '_Auto-opened by `.github/workflows/sync-upstream.yml`._',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Upstream sync conflict (${new Date().toISOString().split('T')[0]})`,
              body,
              labels: ['merge-conflict', 'sync-upstream'],
            });

      - name: Summary
        run: |
          echo "Rebase result: ${{ steps.rebase.outputs.result }}"
          if [ "${{ steps.rebase.outputs.result }}" = "conflict" ]; then
            echo 'Conflicting files:'
            echo "${{ steps.rebase.outputs.conflicts }}"
          fi
